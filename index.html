<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imperium Galactica — Gioco da Tavolo</title>
  <link rel="stylesheet" href="ui/styles.css?v=25" />
</head>
<body>
  <!-- ===================== Schermata di setup ===================== -->
  <div id="setup" class="screen">
    <div class="setup-box">
      <h1>IMPERIUM GALACTICA</h1>
      <p class="subtitle">Il Gioco da Tavolo — versione digitale</p>

      <div class="mode-tabs">
        <button id="tabLocal" class="mode-tab active">🎮 Locale (hot-seat)</button>
        <button id="tabOnline" class="mode-tab">🌐 Online</button>
      </div>

      <!-- Modalità LOCALE -->
      <div id="localSetup">
        <label>Numero di fazioni:
          <select id="numPlayers">
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
          </select>
        </label>
        <div id="playerRows"></div>
        <label>Seed (opzionale, per partite riproducibili):
          <input id="seed" type="number" placeholder="casuale" />
        </label>
        <button id="startBtn" class="primary">Inizia la partita</button>
        <p class="hint">Hot-seat sullo stesso dispositivo. Imposta una fazione come "IA" per farla giocare al computer.</p>
      </div>

      <!-- Modalità ONLINE -->
      <div id="onlineSetup" class="hidden">
        <label>Il tuo nome:
          <input id="onName" type="text" placeholder="Es. Matteo" maxlength="24" />
        </label>
        <label>Codice stanza (creane uno o incollane uno esistente):
          <div class="row-inline">
            <input id="onCode" type="text" placeholder="ABCD" maxlength="8" style="text-transform:uppercase" />
            <button id="onGen" class="small">Genera</button>
          </div>
        </label>
        <label>Server:
          <input id="onServer" type="text" placeholder="wss://imperium-mp.tuosub.workers.dev" />
        </label>
        <button id="onConnect" class="primary">Entra nella stanza</button>
        <p id="onStatus" class="hint"></p>
      </div>
    </div>
  </div>

  <!-- ===================== Lobby online ===================== -->
  <div id="lobby" class="screen hidden">
    <div class="setup-box">
      <h1 style="font-size:24px">SALA D'ATTESA</h1>
      <p class="subtitle">Stanza <b id="lobbyCode"></b> — condividi il codice con gli altri</p>
      <div id="lobbyRoster"></div>
      <div id="lobbyActions"></div>
      <p id="lobbyHint" class="hint"></p>
    </div>
  </div>

  <!-- ===================== Schermata di gioco ===================== -->
  <div id="game" class="screen hidden">
    <header id="topbar">
      <div id="turnInfo"></div>
      <div id="phaseInfo"></div>
      <div class="top-actions">
        <button id="confirmToggle" title="Richiedi conferma di lettura per ogni evento">🔕 Eventi: auto</button>
        <button id="advanceBtn" class="primary">Avanza fase ▸</button>
        <button id="helpBtn">Regole</button>
      </div>
    </header>

    <div id="main">
      <div id="boardWrap">
        <svg id="board" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>

      <aside id="sidebar">
        <section id="playerPanel"></section>
        <section id="selectionPanel">
          <h3>Selezione</h3>
          <div id="selectionBody"><p class="muted">Clicca una flotta o un pianeta.</p></div>
        </section>
        <section id="logPanel">
          <h3>Diario di gioco</h3>
          <div id="logBody"></div>
        </section>
      </aside>
    </div>
  </div>

  <!-- ===================== Modale generica ===================== -->
  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <h3 id="modalTitle"></h3>
      <div id="modalBody"></div>
      <div id="modalActions" class="modal-actions"></div>
    </div>
  </div>

  <!-- Engine (logica pura). Il ?v= forza il refresh dopo gli aggiornamenti. -->
  <script src="data/gamedata.js?v=25"></script>
  <script src="engine/config.js?v=25"></script>
  <script src="engine/hex.js?v=25"></script>
  <script src="engine/game.js?v=25"></script>
  <script src="engine/combat.js?v=25"></script>
  <script src="engine/casino.js?v=25"></script>
  <script src="engine/market.js?v=25"></script>
  <script src="engine/ai.js?v=25"></script>
  <!-- Interfaccia -->
  <script src="ui/net.js?v=25"></script>
  <script src="ui/ui.js?v=25"></script>
</body>
</html>
